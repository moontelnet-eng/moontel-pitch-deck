<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moontel Pitch Deck</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #05070a;
      color: #f6fbff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    main {
      width: min(720px, calc(100vw - 48px));
    }
    .kicker {
      color: #2ee7ff;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      margin: 0 0 1rem;
    }
    h1 {
      margin: 0;
      font-size: clamp(3rem, 11vw, 6rem);
      line-height: 0.96;
      letter-spacing: 0;
    }
    p {
      margin: 1.4rem 0 0;
      color: #99a6b7;
      font-size: 1.15rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main aria-live="polite">
    <p class="kicker">Moontel</p>
    <h1>Internet gratuito in tutto il mondo.</h1>
    <p>Caricamento del pitch deck...</p>
  </main>
  <script>
    const replacements = [
      ["La nuova idea di connettività mobile.", "Internet gratuito in tutto il mondo."],
      ["Dati mobili su eSIM. Gratuiti alla base. Espandibili quando l'utente sceglie di attivarli.", "Moontel ti offre dati mobili su eSIM in oltre 100 paesi, sbloccabili con semplici azioni come brevi sondaggi."]
    ];

    fetch("./moontel_pitch_deck_it.html", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      })
      .then((html) => {
        for (const [from, to] of replacements) {
          html = html.split(from).join(to);
        }
        document.open();
        document.write(html);
        document.close();
      })
      .catch(() => {
        document.querySelector("main").innerHTML = `
          <p class="kicker">Moontel</p>
          <h1>Internet gratuito in tutto il mondo.</h1>
          <p>Moontel ti offre dati mobili su eSIM in oltre 100 paesi, sbloccabili con semplici azioni come brevi sondaggi.</p>
        `;
      });
  </script>
</body>
</html>
